# docker-compose.yml
# Full Financial RAG stack.
#
# Services:
#   qdrant      — Qdrant vector database (port 6333)
#   api         — FastAPI RAG backend   (port 8000)
#   ui          — Streamlit frontend    (port 8501)
#   prometheus  — Metrics scraping      (port 9090)
#   grafana     — Metrics dashboard     (port 3000)
#
# Usage:
#   cp .env.example .env   # fill in OPENAI_API_KEY and SEC_USER_AGENT
#   docker compose up -d
#
# Run ingestion (one-off, after stack is up):
#   docker compose exec api poetry run python -m ingestion.download_filings
#   docker compose exec api poetry run python -m ingestion.pipeline
#
# Access:
#   API docs   → http://localhost:8000/docs
#   UI         → http://localhost:8501
#   Prometheus → http://localhost:9090
#   Grafana    → http://localhost:3000  (admin / admin)
#
# Data persistence:
#   qdrant_data  — Qdrant storage (vectors + payloads)
#   app_data     — BM25 index, transcripts, checkpoints, eval reports
#   grafana_data — Grafana dashboards and datasource config

services:

  # ── Vector database ─────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"   # gRPC port (optional, for qdrant-client gRPC mode)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: rag_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
    volumes:
      - app_data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s    # model loading takes ~20s on warm cache
    restart: unless-stopped
    command: >
      uvicorn api.main:app
        --host 0.0.0.0
        --port 8000
        --workers 2
        --loop uvloop
        --http httptools

  # ── Streamlit frontend ───────────────────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: rag_ui
    ports:
      - "8501:8501"
    environment:
      RAG_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    command: >
      streamlit run ui/app.py
        --server.port 8501
        --server.address 0.0.0.0
        --server.headless true
        --server.fileWatcherType none
        --browser.gatherUsageStats false

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: rag_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle          # allow POST /-/reload to hot-reload config
    depends_on:
      - api
    restart: unless-stopped

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: rag_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: localhost
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro  # optional: pre-configured datasource
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  qdrant_data:
    driver: local
  app_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
