# .github/workflows/ci.yml
#
# Production CI pipeline for Financial RAG System
#
# Job execution (all parallel, no artificial sequencing):
#
#   lint ──────────────────────────────────────────┐
#   typecheck ─────────────────────────────────────┤
#   security ──────────────────────────────────────┤──► ci-gate
#   test (matrix: 3.11, 3.12) ─────────────────────┤
#   validate-configs ──────────────────────────────┤
#   docker-build ──────────────────────────────────┘
#
# Branch protection: require only "CI Gate" to pass.
# Adding new jobs to ci-gate.needs auto-enforces them — no
# need to touch branch protection rules each time.

name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]   # covers develop PRs — old CI missed these

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Principle of least privilege — read-only by default.
# Jobs that need more override this locally.
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.8.3"

jobs:

  # ── Job 1: Lint & Format ──────────────────────────────────────────────────────
  lint:
    name: Lint & Format (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          # runner.os makes the key portable if you ever add macos/windows runners
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}
          # restore-keys: on a cache miss, restore nearest partial cache instead
          # of starting from scratch — saves ~30-60s per job
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        # --no-root: installs deps only, not the project itself — keeps the
        # cache valid even when source files change between runs
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Ruff lint
        # --output-format=github emits inline annotations on PR diff lines
        run: poetry run ruff check . --output-format=github

      - name: Ruff format check
        run: poetry run ruff format --check .


  # ── Job 2: Type Check ─────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Run mypy
        run: >
          poetry run mypy ingestion/
          --ignore-missing-imports
          --disallow-untyped-defs
          --no-strict-optional
          --pretty


  # ── Job 3: Security Scan ──────────────────────────────────────────────────────
  security:
    name: Security Scan (bandit & pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write    # required to upload SARIF to Security tab
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Run pip-audit
        # Checks the environment for dependencies with known vulnerabilities
        run: poetry run pip-audit
        continue-on-error: true

      - name: Run bandit (SARIF output)
        # continue-on-error: findings are VISIBLE in the Security tab but
        # non-blocking — security is a review signal, not a hard build gate
        run: >
          poetry run bandit
          -r .
          -c pyproject.toml
          -x tests/
          --format sarif
          --output bandit-results.sarif
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-results.sarif
        continue-on-error: true


  # ── Job 4: Tests + Coverage ───────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false           # let both matrix legs finish even if one fails
      matrix:
        python-version: ["3.11", "3.12"]

    # Real Qdrant instance — no more fake localhost URL pointing at nothing.
    # Health-checked before tests start so there are no flaky connection errors.
    services:
      qdrant:
        image: qdrant/qdrant:v1.9.2
        ports:
          - 6333:6333
        # NO health-cmd here — qdrant image has no curl/wget installed (by design).
        # Readiness is handled by the explicit wait step below, which runs curl
        # on the GitHub runner (not inside the container) where curl does exist.

    steps:
      - uses: actions/checkout@v4

      - name: Wait for Qdrant to be ready
        # curl runs on the runner host, hitting the mapped port 6333.
        # Polls every 2s for up to 60s before giving up.
        run: |
          echo "Waiting for Qdrant service to accept connections..."
          for i in {1..30}; do
            if curl -sf http://localhost:6333/healthz > /dev/null 2>&1; then
              echo "Qdrant is ready after $((i * 2))s"
              exit 0
            fi
            echo "  attempt $i/30 — retrying in 2s..."
            sleep 2
          done
          echo "Qdrant did not become ready within 60s"
          exit 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Create runtime data directories
        # Mirrors the Dockerfile mkdir so path-dependent tests don't fail
        run: mkdir -p data/transcripts data/eval_reports

      - name: Run unit tests with coverage
        env:
          OPENAI_API_KEY: "sk-test-placeholder-never-called-in-unit-tests"
          QDRANT_URL: "http://localhost:6333"
          SEC_USER_AGENT: "CI Pipeline ci@example.com"
          RAG_RERANKER_ENABLED: "false"
          RAG_CRAG_ENABLED: "false"
        run: >
          poetry run pytest tests/
          -v
          --tb=short
          --durations=20
          -m "not integration"
          --cov=ingestion
          --cov=query
          --cov=retrieval
          --cov=generation
          --cov=crag
          --cov=evaluation
          --cov=api
          --cov=config
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-fail-under=80

      - name: Upload coverage to Codecov
        # Only upload once — from the 3.11 leg to avoid duplicate reports
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: coverage.xml
          flags: unittests
          name: financial-rag-coverage
          fail_ci_if_error: false

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: |
            .pytest_cache/
            coverage.xml
          retention-days: 7


  # ── Job 5: Config File Validation ─────────────────────────────────────────────
  validate-configs:
    name: Validate Config Files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Create stub .env for docker compose validation
        # .env is gitignored (contains real secrets) so it never exists in CI.
        # docker compose config hard-fails if env_file references a missing file.
        # This stub satisfies all variable references without exposing real values.
        run: |
          cat > .env << 'EOF'
          OPENAI_API_KEY=sk-stub-not-real
          QDRANT_URL=http://localhost:6333
          SEC_USER_AGENT=CI stub@example.com
          GRAFANA_ADMIN_PASSWORD=stub-not-real
          EOF

      - name: Validate docker-compose.yml
        # docker compose config resolves all env interpolations and validates
        # service dependencies — far stricter than plain YAML parsing
        run: docker compose config --quiet

      - name: Validate prometheus.yml
        run: |
          pip install pyyaml --quiet
          python -c "import yaml; yaml.safe_load(open('prometheus.yml'))"

      - name: Validate pyproject.toml
        # tomllib is stdlib in Python 3.11+ — no install needed
        run: python -c "import tomllib; tomllib.load(open('pyproject.toml', 'rb'))"


  # ── Job 6: Docker Build ───────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (runtime target, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: false
          # GHA layer cache — warm builds complete in seconds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: financial-rag:ci-${{ github.sha }}


  # ── Final Gate ────────────────────────────────────────────────────────────────
  # Configure branch protection to require ONLY this job.
  # Every required check flows through here — adding a new job to `needs`
  # automatically enforces it without touching branch protection settings.
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint, typecheck, security, test, validate-configs, docker-build]
    if: always()
    steps:
      - name: Evaluate all job results
        run: |
          declare -A results=(
            [lint]="${{ needs.lint.result }}"
            [typecheck]="${{ needs.typecheck.result }}"
            [test]="${{ needs.test.result }}"
            [validate-configs]="${{ needs.validate-configs.result }}"
            [docker-build]="${{ needs.docker-build.result }}"
          )
          failed=()
          for job in "${!results[@]}"; do
            if [[ "${results[$job]}" != "success" ]]; then
              failed+=("$job (${results[$job]})")
            fi
          done
          if [[ ${#failed[@]} -gt 0 ]]; then
            echo "The following required CI jobs did not pass:"
            for f in "${failed[@]}"; do echo "  ✗ $f"; done
            exit 1
          fi
          echo "All CI gates passed."
