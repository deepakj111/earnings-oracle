# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.5"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache venv
        id: cached-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-ubuntu-3.11-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-venv.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Ruff lint
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.5"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache venv
        id: cached-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-ubuntu-3.11-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-venv.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Mypy (ingestion)
        run: poetry run mypy ingestion/ --ignore-missing-imports --no-strict-optional

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.5"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache venv
        id: cached-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-ubuntu-3.11-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-venv.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Bandit
        run: |
          poetry run bandit -c pyproject.toml -r \
            ingestion/ generation/ retrieval/ query/ \
            crag/ evaluation/ api/ config/ ui/ \
            -x tests/ --severity-level medium

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [lint, typecheck, security]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      OPENAI_API_KEY: "sk-test-placeholder-never-called-in-unit-tests"
      QDRANT_URL: "http://localhost:6333"
      SEC_USER_AGENT: "CI Pipeline ci@test.example.com"
      RAG_RERANKER_ENABLED: "false"
      RAG_CRAG_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.5"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache venv
        id: cached-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-ubuntu-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-venv.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Run unit tests (no external services)
        run: |
          poetry run pytest tests/ \
            -v \
            --durations=20 \
            --tb=short \
            -m "not integration" \
            -q

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: .pytest_cache/
          retention-days: 7

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          target: runtime
          tags: financial-rag:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
